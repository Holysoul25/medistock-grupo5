<div class="login-page">
  <div class="login-card">
    <div class="logo">MediStock</div>
    <div class="subtitle">{{ isLogin ? 'Ingresa a tu cuenta' : 'Crea tu cuenta' }}</div>

    <div class="alert alert-red" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Sección solo para registro -->
      <ng-container *ngIf="!isLogin">

        <!-- Selector B2C / B2B -->
        <div class="tipo-selector">
          <button type="button"
            class="tipo-btn"
            [class.activo]="tipoCliente === 'B2C'"
            (click)="setTipo('B2C')">
            <span class="tipo-icono">👤</span>
            <span class="tipo-label">Persona</span>
            <small>Cliente particular</small>
          </button>
          <button type="button"
            class="tipo-btn"
            [class.activo]="tipoCliente === 'B2B'"
            (click)="setTipo('B2B')">
            <span class="tipo-icono">🏥</span>
            <span class="tipo-label">Empresa</span>
            <small>Clínica u organización</small>
          </button>
        </div>

        <div class="form-group">
          <label>{{ tipoCliente === 'B2B' ? 'Nombre del contacto' : 'Nombre' }}</label>
          <input class="form-control" formControlName="nombre"
            [placeholder]="tipoCliente === 'B2B' ? 'María González' : 'Juan'">
          <small class="text-danger" *ngIf="invalid('nombre')">Requerido</small>
        </div>

        <div class="form-group">
          <label>Apellido</label>
          <input class="form-control" formControlName="apellido" placeholder="Opcional">
        </div>

        <!-- Razón social: solo B2B -->
        <div class="form-group" *ngIf="tipoCliente === 'B2B'">
          <label>Razón social <span class="badge-tipo b2b">B2B</span></label>
          <input class="form-control" formControlName="razon_social"
            placeholder="Clínica Las Condes SpA">
          <small class="text-danger" *ngIf="invalid('razon_social')">Requerido para empresas</small>
        </div>

        <div class="form-group">
          <label>{{ tipoCliente === 'B2B' ? 'RUT empresa' : 'RUT' }}</label>
          <input class="form-control" formControlName="rut"
            [placeholder]="tipoCliente === 'B2B' ? '76543210-K' : '12345678-9'">
          <small class="text-danger" *ngIf="invalid('rut')">Requerido</small>
        </div>

      </ng-container>

      <div class="form-group">
        <label>Email</label>
        <input class="form-control" type="email" formControlName="email" placeholder="correo@empresa.cl">
        <small class="text-danger" *ngIf="invalid('email')">Email inválido</small>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input class="form-control" type="password" formControlName="password" placeholder="••••••••">
        <small class="text-danger" *ngIf="invalid('password')">Mínimo 6 caracteres</small>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Cargando…' : (isLogin ? 'Iniciar sesión' : 'Registrarse') }}
      </button>
    </form>

    <div class="form-toggle">
      <span>{{ isLogin ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?' }}</span>
      <a (click)="toggle()"> {{ isLogin ? 'Regístrate' : 'Inicia sesión' }}</a>
    </div>
  </div>
</div>
